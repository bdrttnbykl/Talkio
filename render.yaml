services:
  - type: web
    name: talkio-backend
    env: node
    rootDir: backend
    buildCommand: npm ci && npm run build && npm run prisma:deploy
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URLS
        sync: false
